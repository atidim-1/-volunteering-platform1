<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#000000">
    <title>מאגר התנדבויות עתידים לקריירה</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* רשת משבצות */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 191, 255, 0.18) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 191, 255, 0.18) 2px, transparent 2px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }

        /* אייקונים דקורטיביים */
        .star {
            position: fixed;
            font-size: 100px;
            font-weight: bold;
            z-index: 1;
            pointer-events: none;
            text-shadow: 0 0 20px currentColor;
            animation: pulse 4s ease-in-out infinite;
        }

        .star-1 { top: 8%; right: 10%; color: #90EE90; animation-delay: 0s; }
        .star-2 { top: 22%; left: 7%; color: #00BFFF; animation-delay: 1s; }
        .star-3 { top: 48%; right: 8%; color: #FFD700; animation-delay: 2s; }
        .star-4 { top: 68%; left: 10%; color: #FF69B4; animation-delay: 0.5s; }
        .star-5 { top: 82%; right: 12%; color: #00BFFF; animation-delay: 1.5s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.1); }
        }

        .arrow {
            position: fixed;
            font-size: 90px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
            animation: float 5s ease-in-out infinite;
        }

        .arrow-1 { top: 32%; right: 18%; color: #FFA500; transform: rotate(-45deg); animation-delay: 1s; }
        .arrow-2 { bottom: 30%; left: 20%; color: #FFD700; transform: rotate(135deg); animation-delay: 2.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-45deg); }
            50% { transform: translateY(-15px) rotate(-45deg); }
        }

        .triangle {
            position: fixed;
            width: 0;
            height: 0;
            border-style: solid;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
            animation: spin 20s linear infinite;
        }

        .tri-1 { border-width: 0 50px 85px 50px; border-color: transparent transparent #00BFFF transparent; top: 14%; left: 4%; }
        .tri-2 { border-width: 0 60px 100px 60px; border-color: transparent transparent #FF69B4 transparent; bottom: 20%; right: 5%; }
        .tri-3 { border-width: 0 45px 75px 45px; border-color: transparent transparent #90EE90 transparent; top: 58%; left: 16%; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .circle {
            position: fixed;
            width: 70px;
            height: 70px;
            border: 5px solid;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
            animation: bounce 3s ease-in-out infinite;
        }

        .circle-1 { top: 16%; left: 28%; border-color: #90EE90; animation-delay: 0.5s; }
        .circle-2 { bottom: 25%; right: 22%; border-color: #FF69B4; animation-delay: 1.5s; }
        .circle-3 { top: 40%; right: 30%; border-color: #FFD700; width: 50px; height: 50px; animation-delay: 2s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .ladder {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        .ladder-1 {
            top: 25%;
            left: 12%;
            width: 40px;
            height: 100px;
            border-left: 4px solid #00BFFF;
            border-right: 4px solid #00BFFF;
            background: repeating-linear-gradient(to bottom, transparent, transparent 18px, #00BFFF 18px, #00BFFF 22px);
        }

        .ladder-2 {
            bottom: 35%;
            right: 15%;
            width: 35px;
            height: 80px;
            border-left: 4px solid #FF69B4;
            border-right: 4px solid #FF69B4;
            background: repeating-linear-gradient(to bottom, transparent, transparent 15px, #FF69B4 15px, #FF69B4 19px);
            transform: rotate(15deg);
        }

        .content {
            position: relative;
            z-index: 10;
        }

        .header {
            background: #000000;
            padding: 25px 20px;
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .logo { height: 60px; }
        .header-text { flex: 1; }

        .header h1 {
            font-size: 1.5em;
            color: white;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .search-section {
            background: #000000;
            padding: 16px 20px;
            position: sticky;
            top: 110px;
            z-index: 99;
            border-bottom: 1px solid rgba(0, 191, 255, 0.15);
        }

        .search-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border: 2px solid rgba(0, 191, 255, 0.3);
            border-radius: 30px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.95);
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            background: white;
            border-color: #00BFFF;
            box-shadow: 0 0 0 3px rgba(0, 191, 255, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #00BFFF;
            pointer-events: none;
        }

        .filters-location {
            background: #000000;
            padding: 12px 20px 8px;
            position: sticky;
            top: 170px;
            z-index: 98;
            border-bottom: 1px solid rgba(0, 191, 255, 0.08);
        }

        .filter-label {
            color: white;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .filters-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 6px;
        }

        .filters-row::-webkit-scrollbar { display: none; }

        .filters-category {
            background: #000000;
            padding: 8px 20px 12px;
            position: sticky;
            top: 232px;
            z-index: 97;
            border-bottom: 1px solid rgba(0, 191, 255, 0.15);
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 2px solid rgba(0, 191, 255, 0.4);
            padding: 9px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .chip:hover {
            background: rgba(0, 191, 255, 0.15);
            border-color: #00BFFF;
        }

        .chip.active {
            background: #00BFFF;
            color: white;
            border-color: #00BFFF;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
        }

        .chip-location.active {
            background: #FF69B4;
            border-color: #FF69B4;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
        }

        .stats {
            max-width: 1200px;
            margin: 18px auto;
            padding: 12px 18px;
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 14px;
            text-align: center;
            font-weight: 600;
            color: white;
            font-size: 0.95em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 350px), 1fr));
            gap: 16px;
        }

        /* כרטיס קומפקטי */
        .card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 3px 15px rgba(0, 191, 255, 0.2);
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #00BFFF;
            border-radius: 14px 0 0 14px;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 191, 255, 0.3);
        }

        .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 700;
        }

        .badge-main { background: #00BFFF; color: white; }
        .badge-sub { background: #ffe6f0; color: #FF1493; }
        .badge-online { background: #90EE90; color: #006400; }
        .badge-region { background: #FFE5B4; color: #8B4513; }

        .card-title {
            font-size: 1.05em;
            font-weight: 800;
            color: #000;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card-location {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
        }

        .card-arrow {
            position: absolute;
            bottom: 18px;
            left: 18px;
            font-size: 1.2em;
            color: #00BFFF;
        }

        /* Modal מלא */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1001;
            overflow-y: auto;
        }

        .detail-modal.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .detail-content {
            background: white;
            max-width: 700px;
            margin: 20px auto;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            animation: slideUp 0.4s;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .detail-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #f0f0f0;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5em;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .detail-close:hover {
            background: #e0e0e0;
            transform: rotate(90deg);
        }

        .detail-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .detail-title {
            font-size: 1.6em;
            font-weight: 800;
            color: #000;
            margin-bottom: 20px;
            line-height: 1.4;
            padding-left: 50px;
        }

        .detail-info {
            display: flex;
            align-items: start;
            margin: 14px 0;
            font-size: 1em;
        }

        .detail-icon {
            font-size: 1.2em;
            margin-left: 12px;
            min-width: 28px;
        }

        .detail-text {
            color: #555;
            flex: 1;
            line-height: 1.7;
        }

        .detail-text a {
            color: #00BFFF;
            text-decoration: none;
            font-weight: 700;
        }

        .detail-description {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            color: #666;
            font-size: 1em;
            line-height: 1.8;
        }

        .detail-value {
            margin-top: 20px;
            padding: 16px 18px;
            background: linear-gradient(135deg, #e6f7ff 0%, #fff0f6 100%);
            border-right: 4px solid #00BFFF;
            border-radius: 14px;
            font-size: 0.95em;
            line-height: 1.7;
            color: #333;
            font-weight: 500;
        }

        .detail-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .detail-btn {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            border-radius: 14px;
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .detail-btn:hover {
            transform: translateY(-3px);
        }

        .detail-btn-email {
            background: #00BFFF;
            color: white;
        }

        .detail-btn-phone {
            background: #FF69B4;
            color: white;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 24px;
            background: #FF69B4;
            color: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.4);
            font-size: 0.95em;
            font-weight: 700;
            z-index: 1000;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .fab:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 105, 180, 0.6);
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(0, 191, 255, 0.2);
            padding: 10px 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7em;
            z-index: 99;
        }

        .no-results {
            text-align: center;
            padding: 60px 24px;
            color: white;
        }

        .no-results-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .no-results-text {
            font-size: 1.2em;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body { padding-bottom: 100px; }
            
            .header {
                padding: 20px 16px;
            }

            .header-inner {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }

            .logo { height: 48px; }
            
            .header h1 { 
                font-size: 1.1em;
                line-height: 1.3;
            }

            .search-section {
                padding: 14px 16px;
            }
            
            .search-input {
                font-size: 16px;
                padding: 13px 45px 13px 16px;
            }

            .search-icon {
                left: 16px;
                font-size: 18px;
            }

            .filters-location,
            .filters-category {
                padding-left: 16px;
                padding-right: 16px;
            }

            .filter-label {
                font-size: 0.8em;
            }

            .chip {
                padding: 8px 13px;
                font-size: 12px;
            }

            .stats {
                font-size: 0.88em;
                margin: 14px 16px;
            }

            .container {
                padding: 0 16px 40px;
            }

            .cards {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .card {
                padding: 16px;
            }

            .card-title {
                font-size: 1em;
            }

            .star { font-size: 50px !important; }
            .arrow { font-size: 45px !important; }
            .triangle { border-width: 0 25px 40px 25px !important; }
            .circle { width: 40px !important; height: 40px !important; }
            .ladder { display: none; }

            .detail-content {
                margin: 10px;
                padding: 25px 20px;
                border-radius: 16px;
            }

            .detail-title {
                font-size: 1.3em;
                padding-left: 45px;
            }

            .detail-close {
                top: 15px;
                left: 15px;
                width: 36px;
                height: 36px;
            }

            .detail-info {
                font-size: 0.92em;
            }

            .detail-value {
                font-size: 0.88em;
                padding: 14px 16px;
            }

            .detail-actions {
                flex-direction: column;
            }

            .detail-btn {
                width: 100%;
            }

            .fab {
                bottom: 70px;
                padding: 12px 20px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.05em; }
            .logo { height: 44px; }
            .detail-title { font-size: 1.2em; }
        }
    </style>
</head>

        let all = DATA;
        let filtered = DATA;
        let activeLocation = 'הכל';
        let activeCategory = 'הכל';

        function init() {
            filtered = all;
            update();
            highlightActive();
        }

        function filterByLocation(loc) {
            activeLocation = loc;
            applyFilters();
            highlightActive();
        }

        function filterByCategory(cat) {
            activeCategory = cat;
            applyFilters();
            highlightActive();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search').value.toLowerCase();

            filtered = all.filter(i => {
                const matchSearch = !searchTerm || 
                    i.name.toLowerCase().includes(searchTerm) ||
                    (i.description && i.description.toLowerCase().includes(searchTerm)) ||
                    (i.location && i.location.toLowerCase().includes(searchTerm)) ||
                    (i.type && i.type.toLowerCase().includes(searchTerm));

                const matchLocation = activeLocation === 'הכל' || i.region === activeLocation;
                const matchCategory = activeCategory === 'הכל' || i.subcategory === activeCategory;

                return matchSearch && matchLocation && matchCategory;
            });

            update();
        }

        function highlightActive() {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            
            document.querySelectorAll('.chip-location').forEach(c => {
                if (c.textContent.includes(activeLocation)) {
                    c.classList.add('active');
                }
            });
            
            document.querySelectorAll('.chip:not(.chip-location)').forEach(c => {
                if (c.textContent.includes(activeCategory) || 
                    (activeCategory === 'הכל' && c.textContent.includes('הכל'))) {
                    c.classList.add('active');
                }
            });
        }

        function resetAll() {
            document.getElementById('search').value = '';
            activeLocation = 'הכל';
            activeCategory = 'הכל';
            applyFilters();
            highlightActive();
        }

        function update() {
            updateStats();
            render();
        }

        function updateStats() {
            const online = filtered.filter(i => i.region === 'מקוון').length;
            document.getElementById('stats').textContent = 
                `נמצאו ${filtered.length} מקומות התנדבות (💻 ${online} מקוונות)`;
        }

        function render() {
            const c = document.getElementById('cards');

            if (filtered.length === 0) {
                c.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <div class="no-results-text">לא נמצאו תוצאות</div>
                        <small>נסו לשנות את הסינון</small>
                    </div>
                `;
                return;
            }

            c.innerHTML = filtered.map((i, idx) => `
                <div class="card" onclick="showDetail(${idx})">
                    <div class="badges">
                        <span class="badge badge-main">${i.category}</span>
                        ${i.subcategory ? `<span class="badge badge-sub">${i.subcategory}</span>` : ''}
                        ${i.region === 'מקוון' ? '<span class="badge badge-online">💻 מקוון</span>' : ''}
                        ${i.region && i.region !== 'מקוון' && i.region !== 'לא מוגדר' ? `<span class="badge badge-region">${i.region}</span>` : ''}
                    </div>

                    <div class="card-title">${i.name}</div>

                    ${i.location ? `
                        <div class="card-location">📍 ${i.location}</div>
                    ` : ''}

                    <div class="card-arrow">←</div>
                </div>
            `).join('');
        }

        function showDetail(idx) {
            const i = filtered[idx];
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('detailBody');

            body.innerHTML = `
                <div class="detail-badges">
                    <span class="badge badge-main">${i.category}</span>
                    ${i.subcategory ? `<span class="badge badge-sub">${i.subcategory}</span>` : ''}
                    ${i.region === 'מקוון' ? '<span class="badge badge-online">💻 מקוון</span>' : ''}
                    ${i.region && i.region !== 'מקוון' && i.region !== 'לא מוגדר' ? `<span class="badge badge-region">${i.region}</span>` : ''}
                </div>

                <div class="detail-title">${i.name}</div>

                ${i.location ? `
                    <div class="detail-info">
                        <span class="detail-icon">📍</span>
                        <span class="detail-text">${i.location}</span>
                    </div>
                ` : ''}

                ${i.contact ? `
                    <div class="detail-info">
                        <span class="detail-icon">👤</span>
                        <span class="detail-text">${i.contact}</span>
                    </div>
                ` : ''}

                ${i.phone && i.phone !== 'nan' ? `
                    <div class="detail-info">
                        <span class="detail-icon">📞</span>
                        <span class="detail-text" dir="ltr">${i.phone}</span>
                    </div>
                ` : ''}

                ${i.email && i.email !== 'nan' && i.email.includes('@') ? `
                    <div class="detail-info">
                        <span class="detail-icon">✉️</span>
                        <span class="detail-text">
                            <a href="mailto:${i.email.trim()}">${i.email}</a>
                        </span>
                    </div>
                ` : ''}

                ${i.description && i.description !== 'nan' ? `
                    <div class="detail-description">${i.description}</div>
                ` : ''}

                ${i.value_proposition ? `
                    <div class="detail-value">${i.value_proposition}</div>
                ` : ''}

                <div class="detail-actions">
                    ${i.email && i.email !== 'nan' && i.email.includes('@') ? `
                        <a href="mailto:${i.email.trim()}" class="detail-btn detail-btn-email">
                            ✉️ שלח מייל
                        </a>
                    ` : ''}
                    ${i.phone && i.phone !== 'nan' ? `
                        <a href="tel:${i.phone.replace(/\s/g, '').replace(/\n/g, '')}" class="detail-btn detail-btn-phone">
                            📞 התקשר
                        </a>
                    ` : ''}
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            const modal = document.getElementById('detailModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // סגירה בלחיצה על הרקע
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target.id === 'detailModal') {
                closeDetail();
            }
        });

        document.getElementById('search').addEventListener('input', applyFilters);

        init();
    </script>
